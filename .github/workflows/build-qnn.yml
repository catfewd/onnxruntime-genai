name: Build ORT GenAI with QNN for Android (HTP v75)

on:
  workflow_dispatch:
  push:
    tags: [ 'ort-genai-qnn-*' ]

env:
  ORT_COMMIT: 312f5249437a4f923a6b288902bd802532f7b159
  NDK_VERSION: r27c
  ANDROID_API: 24
  QNN_HOME: /opt/qnn-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout ORT source at pinned commit
        uses: actions/checkout@v4
        with:
          repository: microsoft/onnxruntime
          ref: ${{ env.ORT_COMMIT }}
          submodules: recursive
          path: onnxruntime
          fetch-depth: 1

      - name: Checkout ONNX GenAI source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          path: onnxruntime-genai
          fetch-depth: 1

      - name: Cache QNN SDK
        id: cache-qnn
        uses: actions/cache/restore@v4
        with:
          path: /opt/qnn-sdk
          key: qnn-sdk-2.46.0.260424-extracted

      - name: Download and extract QNN SDK
        if: steps.cache-qnn.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /opt/qnn-sdk
          gh release download qnn-sdk-2.46.0.260424 \
            --repo catfewd/temp-hexagon-compiler \
            --pattern "qnn-sdk-2.46.0.260424-*.tar.gz" \
            --dir /tmp \
            --clobber
          tar xzf /tmp/qnn-sdk-*.tar.gz -C /opt/qnn-sdk
          cp -r /opt/qnn-sdk/qnn-sdk-min/* /opt/qnn-sdk/ 2>/dev/null || true
          echo "=== Verifying ==="
          ls $QNN_HOME/include/QNN/QnnInterface.h

      - name: Save QNN SDK cache
        if: steps.cache-qnn.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /opt/qnn-sdk
          key: qnn-sdk-2.46.0.260424-extracted

      - name: Install Android NDK
        run: |
          curl -sL -o ndk.zip "https://dl.google.com/android/repository/android-ndk-r27c-linux.zip"
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$(pwd)/android-ndk-r27c" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$(pwd)/android-ndk-r27c" >> $GITHUB_ENV

      - name: Setup ccache
        run: |
          sudo apt-get install -y ccache
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          ccache --max-size 5G

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ env.ORT_COMMIT }}-qnn
          restore-keys: ccache-${{ runner.os }}-${{ env.ORT_COMMIT }}-

      - name: Build ONNX Runtime with QNN EP
        timeout-minutes: 300
        run: |
          cd onnxruntime
          export CMAKE_C_COMPILER_LAUNCHER=ccache CMAKE_CXX_COMPILER_LAUNCHER=ccache CCACHE_CPP2=yes
          ./build.sh \
            --build_shared_lib \
            --android \
            --config MinSizeRel \
            --parallel 4 \
            --use_qnn static_lib \
            --qnn_home $QNN_HOME \
            --android_ndk_path $ANDROID_NDK_HOME \
            --android_abi arm64-v8a \
            --android_api $ANDROID_API \
            --cmake_generator Ninja \
            --build_dir build/Android \
            --skip_tests \
            --update --build

      - name: Build ONNX GenAI with QNN EP
        timeout-minutes: 300
        run: |
          cd onnxruntime-genai
          export CMAKE_C_COMPILER_LAUNCHER=ccache CMAKE_CXX_COMPILER_LAUNCHER=ccache CCACHE_CPP2=yes
          export ORT_HOME=$(pwd)/../onnxruntime
          ./build.sh \
            --android \
            --android_abi arm64-v8a \
            --android_api $ANDROID_API \
            --android_ndk_path $ANDROID_NDK_HOME \
            --config MinSizeRel \
            --parallel 4 \
            --ort_home $ORT_HOME \
            --build_java \
            --skip_wheel \
            --update --build

      - name: List build artifacts
        run: |
          echo "=== ONNX Runtime ==="
          ls -la onnxruntime/build/Android/MinSizeRel/*.so 2>/dev/null | head -5
          echo "=== ONNX GenAI ==="
          find onnxruntime-genai/build -name "libonnxruntime-genai*.so" 2>/dev/null

      - name: Verify QNN in ONNX Runtime
        run: |
          echo "=== QNN symbols in libonnxruntime ==="
          nm -D onnxruntime/build/Android/MinSizeRel/libonnxruntime.so 2>/dev/null | grep -i qnn | head -5 || echo "No QNN symbols"
          echo "=== Providers ==="
          strings onnxruntime/build/Android/MinSizeRel/libonnxruntime.so 2>/dev/null | grep -i ExecutionProvider | head -10

      - name: Upload ONNX GenAI with QNN
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-genai-qnn-android
          path: |
            onnxruntime-genai/build/out/lib/libonnxruntime-genai.so
            onnxruntime-genai/build/out/lib/libonnxruntime-genai-jni.so
            onnxruntime/build/Android/MinSizeRel/libonnxruntime.so
          if-no-files-found: error